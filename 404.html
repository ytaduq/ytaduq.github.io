<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/x-icon" href="https://www.xiaohaozj.com/favicon.ico">
    <title>404 - 页面走丢了</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, sans-serif;
        }

        body {

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                linear-gradient(135deg,
                    #f2f4f8 0%,
                    #ffffff 100%);

            overflow: hidden;
            position: relative;
        }

        body:before {

            content: '';

            position: absolute;

            width: 500px;
            height: 500px;

            background:
                radial-gradient(circle,
                    rgba(37, 244, 238, .18),
                    rgba(254, 44, 85, .1));

            border-radius: 50%;

            top: -150px;
            right: -150px;

            filter: blur(80px);
        }

        body:after {

            content: '';

            position: absolute;

            width: 400px;
            height: 400px;

            background:
                radial-gradient(circle,
                    rgba(138, 63, 252, .15),
                    transparent);

            bottom: -150px;
            left: -150px;

            border-radius: 50%;

            filter: blur(90px);
        }

        .box {

            width: 95%;
            max-width: 700px;

            background: #fff;

            border-radius: 35px;

            padding: 60px;

            text-align: center;

            box-shadow:
                0 25px 60px rgba(0, 0, 0, .08);

            border: 1px solid rgba(0, 0, 0, .04);

            position: relative;

            z-index: 2;
        }

        .error {

            font-size: 120px;

            font-weight: 900;

            line-height: 1;

            background:
                linear-gradient(135deg,
                    #25f4ee,
                    #fe2c55,
                    #8a3ffc);

            background-size: 200%;

            -webkit-background-clip: text;
            background-clip:text;

            color: transparent;

            animation: move 6s infinite;
        }

        @keyframes move {

            0% {
                background-position: 0 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0 50%
            }

        }

        .icon {

            font-size: 70px;

            margin: 20px 0;

            color: #fe2c55;

            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }

        }

        .title {

            font-size: 35px;

            font-weight: 800;

            margin-bottom: 15px;
        }

        .desc {

            font-size: 16px;

            line-height: 1.8;

            color: #64748b;

            margin-bottom: 35px;
        }

        .btns {

            display: flex;

            gap: 15px;

            justify-content: center;

            flex-wrap: wrap;
        }

        .btn {

            padding: 16px 35px;

            border-radius: 999px;

            text-decoration: none;

            font-weight: 700;

            transition: .3s;
        }

        .home {

            background:
                linear-gradient(135deg,
                    #25f4ee,
                    #fe2c55,
                    #8a3ffc);

            background-size: 200%;

            color: #fff;
        }

        .home:hover {

            transform: translateY(-5px);

            box-shadow:
                0 15px 35px rgba(254, 44, 85, .4);
        }

        .back {

            background: #fff;

            border: 2px solid #eee;

            color: #333;
        }

        .back:hover {

            border-color: #fe2c55;

            color: #fe2c55;
        }

        @media(max-width:768px) {

            .box {
                padding: 35px 25px;
            }

            .error {
                font-size: 80px;
            }

            .title {
                font-size: 26px;
            }

        }
    </style>
</head>

<body>

    <div class="box">

        <div class="error">
            404
        </div>

        <div class="icon">
            <i class="fa-solid fa-face-sad-tear"></i>
        </div>

        <div class="title">
            页面走丢了
        </div>

        <div class="desc">
            您访问的页面不存在、已删除，或者正在摸鱼中...<br>
            可以返回首页继续浏览
        </div>

        <div class="btns">

            <a href="/" class="btn home">

                <i class="fa-solid fa-house"></i>
                返回首页

            </a>

            <a href="javascript:history.back()" class="btn back">

                <i class="fa-solid fa-arrow-left"></i>
                返回上页

            </a>

        </div>

    </div>

</body>

</html>
